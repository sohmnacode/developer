<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="color-scheme" content="light"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Saved Pages | ReincarnatedAI</title>
<meta name="description" content="Your bookmarked research pages on ReincarnatedAI."/>
<link rel="canonical" href="https://reincarnatedai.com/bookmarks"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/theme.css">
<link rel="stylesheet" href="/assets/chat-widget.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F8F5EF;font-family:'Inter',system-ui,sans-serif;color:#1A1535;overflow-x:hidden;min-height:100vh}
h1,h2,h3,h4{font-family:'Space Grotesk',system-ui,sans-serif}

nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:20px 40px;background:rgba(8,6,42,0.3);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,0.07);transition:background .35s,border-color .35s}
nav.scrolled{background:rgba(248,245,239,0.94);border-bottom-color:rgba(100,75,180,0.13)}
nav.scrolled .links a{color:rgba(26,21,53,0.75)}
nav.scrolled .links a:hover{color:#1A1535}
nav.scrolled .logo{background:linear-gradient(135deg,#7B4FC9,#9B6FE0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo{font-family:'Space Grotesk',system-ui,sans-serif;font-size:17px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:linear-gradient(135deg,#A08BDE,#C5B0F0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none}
.links{display:flex;gap:30px}
.links a{font-size:13px;color:rgba(255,255,255,.6);text-decoration:none;transition:color .2s}
.links a:hover{color:#fff}

.hero{min-height:38vh;display:flex;align-items:flex-end;padding:0 80px 56px;background:linear-gradient(to bottom,#080615,#140D33);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 50% 60% at 60% 30%,rgba(109,40,217,.18),transparent)}
.hero-content{position:relative;z-index:1}
.tag{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(160,139,222,.8);margin-bottom:12px}
.hero h1{font-size:clamp(30px,4.5vw,54px);font-weight:800;letter-spacing:-.03em;line-height:1.06;background:linear-gradient(140deg,#fff 0%,#D4C8F5 50%,#A08BDE 90%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-desc{font-size:15px;color:rgba(255,255,255,.42);margin-top:14px;line-height:1.7;max-width:480px}

main{padding:64px 80px 120px;max-width:1100px;margin:0 auto}
@media(max-width:768px){.hero{padding:0 28px 48px}main{padding:48px 24px 100px}.links{display:none}}

.bm-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px;gap:16px;flex-wrap:wrap}
.bm-count{font-size:13px;color:rgba(26,21,53,.45);letter-spacing:.04em}
.bm-clear-btn{font-size:12px;color:rgba(160,50,50,.7);background:none;border:1px solid rgba(160,50,50,.2);padding:7px 16px;border-radius:8px;cursor:pointer;font-family:inherit;transition:background .15s,color .15s}
.bm-clear-btn:hover{background:rgba(180,50,50,.08);color:rgba(180,40,40,.9)}

.bm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.bm-card{background:#fff;border-radius:16px;padding:24px;border:1px solid rgba(100,75,180,.1);text-decoration:none;color:inherit;transition:box-shadow .2s,transform .15s;display:flex;flex-direction:column;gap:8px;position:relative}
.bm-card:hover{box-shadow:0 8px 32px rgba(100,75,180,.12);transform:translateY(-2px)}
.bm-card-title{font-size:16px;font-weight:700;color:#1A1535;line-height:1.3;font-family:'Space Grotesk',system-ui,sans-serif}
.bm-card-desc{font-size:13px;color:rgba(26,21,53,.5);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.bm-card-date{font-size:11px;color:rgba(26,21,53,.3);letter-spacing:.04em;margin-top:4px}
.bm-card-remove{position:absolute;top:14px;right:14px;background:none;border:none;color:rgba(26,21,53,.2);cursor:pointer;font-size:16px;line-height:1;padding:4px;border-radius:6px;transition:color .15s,background .15s}
.bm-card-remove:hover{color:rgba(180,50,50,.8);background:rgba(180,50,50,.08)}
.bm-card-url{font-size:11px;color:rgba(109,40,217,.5);letter-spacing:.04em;margin-top:auto;padding-top:8px}

.bm-empty{text-align:center;padding:96px 24px;color:rgba(26,21,53,.35)}
.bm-empty-icon{font-size:40px;margin-bottom:16px;opacity:.3}
.bm-empty h2{font-size:22px;font-weight:700;margin-bottom:8px;color:rgba(26,21,53,.5)}
.bm-empty p{font-size:14px;line-height:1.7;max-width:360px;margin:0 auto 28px}
.bm-empty a{display:inline-block;padding:11px 26px;background:linear-gradient(135deg,#6D28D9,#8B5CF6);border-radius:10px;font-size:14px;font-weight:600;color:#fff;text-decoration:none;transition:opacity .2s}
.bm-empty a:hover{opacity:.85}

footer{text-align:center;padding:40px 24px;font-size:12px;color:rgba(26,21,53,.35);border-top:1px solid rgba(100,75,180,.07);margin:0 80px}
@media(max-width:768px){footer{margin:0 24px}}

[data-theme="dark"] body{background:#080615;color:rgba(255,255,255,.85)}
[data-theme="dark"] .bm-card{background:#110D2A;border-color:rgba(160,139,222,.12)}
[data-theme="dark"] .bm-card-title{color:rgba(255,255,255,.9)}
[data-theme="dark"] .bm-card-desc{color:rgba(255,255,255,.38)}
[data-theme="dark"] .bm-card-date{color:rgba(255,255,255,.2)}
[data-theme="dark"] .bm-card-remove{color:rgba(255,255,255,.2)}
[data-theme="dark"] .bm-count{color:rgba(255,255,255,.35)}
[data-theme="dark"] .bm-empty{color:rgba(255,255,255,.3)}
[data-theme="dark"] .bm-empty h2{color:rgba(255,255,255,.4)}
[data-theme="dark"] footer{color:rgba(255,255,255,.25);border-top-color:rgba(160,139,222,.08)}
</style>
</head>
<body>
<nav id="nav">
  <a href="/" class="logo">ReincarnatedAI</a>
  <div class="links">
    <a href="/evidence">Evidence</a>
    <a href="/cases">Cases</a>
    <a href="/researchers">Researchers</a>
    <a href="/library">Library</a>
  </div>
</nav>

<div class="hero">
  <div class="hero-content">
    <div class="tag">Your Library</div>
    <h1>Saved Pages</h1>
    <p class="hero-desc">Research pages you've bookmarked for later reading.</p>
  </div>
</div>

<main>
  <div class="bm-toolbar">
    <span class="bm-count" id="bm-count"></span>
    <button class="bm-clear-btn" id="bm-clear" style="display:none">Clear all bookmarks</button>
  </div>
  <div id="bm-grid" class="bm-grid"></div>
</main>

<footer>All Rights Reserved. 2026 © ReincarnatedAI, LLC.™</footer>

<script>
window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 60);
});
</script>
<script src="/assets/ui.js" defer></script>
<script src="/assets/bookmarks.js" defer></script>
<script src="/assets/chat-widget.js?v=3" defer></script>
<script>
(function renderBookmarks() {
  const KEY = 'rai_bookmarks_v1';
  function getBookmarks() {
    try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; }
  }
  function saveBookmarks(list) {
    try { localStorage.setItem(KEY, JSON.stringify(list)); } catch {}
  }

  function fmt(iso) {
    try { return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }); }
    catch { return ''; }
  }

  function render() {
    const list = getBookmarks();
    const grid = document.getElementById('bm-grid');
    const count = document.getElementById('bm-count');
    const clearBtn = document.getElementById('bm-clear');

    count.textContent = list.length === 0 ? '' : list.length === 1 ? '1 saved page' : `${list.length} saved pages`;
    clearBtn.style.display = list.length > 0 ? '' : 'none';

    if (list.length === 0) {
      grid.innerHTML = `
        <div class="bm-empty" style="grid-column:1/-1">
          <div class="bm-empty-icon">◈</div>
          <h2>No saved pages yet</h2>
          <p>Tap the bookmark icon in the navigation bar on any research page to save it here.</p>
          <a href="/">Explore research</a>
        </div>`;
      return;
    }

    grid.innerHTML = list.map((b, i) => `
      <a href="${b.url}" class="bm-card" data-idx="${i}">
        <div class="bm-card-title">${escHtml(b.title)}</div>
        ${b.desc ? `<div class="bm-card-desc">${escHtml(b.desc)}</div>` : ''}
        <div class="bm-card-date">${fmt(b.date)}</div>
        <div class="bm-card-url">reincarnatedai.com${b.url}</div>
        <button class="bm-card-remove" data-url="${escAttr(b.url)}" title="Remove bookmark" aria-label="Remove bookmark">×</button>
      </a>`).join('');

    grid.querySelectorAll('.bm-card-remove').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault(); e.stopPropagation();
        const url = btn.dataset.url;
        saveBookmarks(getBookmarks().filter(b => b.url !== url));
        render();
      });
    });
  }

  function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function escAttr(s) { return (s||'').replace(/"/g,'&quot;'); }

  document.getElementById('bm-clear').addEventListener('click', () => {
    if (confirm('Remove all bookmarks?')) { saveBookmarks([]); render(); }
  });

  document.addEventListener('DOMContentLoaded', render);
  render();
})();
</script>
</body>
</html>
